name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    name: Claude Auto Agent
    runs-on: ubuntu-latest

    # CLAUDE_ENABLED = 'true' のときだけ実行（GitHub Variables でオン/オフ）
    if: vars.CLAUDE_ENABLED == 'true'

    # 同じ PR/Issue への重複実行をキャンセル（コスト節約）
    concurrency:
      group: claude-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
